version: 2
updates:
  # Infrastructure
  ## GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    groups:
      gh-actions:
        patterns: ["*"]
    commit-message:
      prefix: "deps(ci)"

  # Codebase
  ## Composer/PHP
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    commit-message:
      prefix: "deps(composer)"
    groups:
      mediawiki:
        patterns:
          - "mediawiki/*"
      php-parallel-lint:
        patterns:
          - "php-parallel-lint/*"

  ## npm
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "thursday"
      time: "09:00"
    commit-message:
      prefix: "deps(npm)"
