name: Update Vanilla Framework palette

# Syncs the Ubuntu MediaWiki skin's colour palette with the latest Vanilla
# Framework release.  Downloads the upstream Sass colour sources, generates a
# throwaway shim on the fly that includes Vanilla's own vf-theme-*--colors
# mixins, compiles it with Dart Sass, wraps the output into a .less file, and
# opens a PR when the palette has changed.
#
# The generated palette reproduces Vanilla's native `--vf-color-*` custom
# properties for the complete colour set — no hand-maintained variable list.
# Each theme is exposed as a callable Less mixin (`.vf-theme-light-colors()`,
# `.vf-theme-dark-colors()`, `.vf-theme-paper-colors()`) plus constant Ubuntu
# branding (`.vf-static-colors()`).  These mixins produce no output on their own;
# applying them (at the document root and/or on individual elements) is done
# manually elsewhere in the skin's stylesheets, so this generated file stays
# purely declarative.  New upstream colours flow through automatically.
#
# ── Upstream changes ───────────────────────────────────────────────────────────
# • New upstream colours    → picked up automatically on the next sync
# • Removed / renamed vars  → sass compile error; this job fails before any PR is
#                              created, making the breakage immediately visible

on:
  workflow_dispatch:
    inputs:
      vanilla_ref:
        description: "Vanilla Framework ref (tag, branch, or SHA). Leave empty to use the latest stable release."
        default: ""
        required: false
        type: string
      dry_run:
        description: "If true, don't create a PR even if there are changes"
        default: false
        required: false
        type: boolean
  schedule:
    - cron: "0 9 * * 1" # Every Monday at 09:00 UTC
  pull_request:
    paths-ignore:
      - resources/skins.ubuntu.styles/ubuntu/ubuntu-palette.less

jobs:
  update-palette:
    runs-on: ubuntu-latest

    permissions:
      contents: write # checkout repo + push the bot PR branch
      pull-requests: write # open / update the bot PR

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6

      - name: Install Dart Sass
        run: npm install --global sass

      - name: Resolve Vanilla Framework ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          INPUT_REF="${{ inputs.vanilla_ref }}"
          if [ -z "${INPUT_REF}" ]; then
            echo "No ref supplied — resolving latest stable release"
            # gh release view without a tag returns the latest non-prerelease, non-draft release.
            INPUT_REF=$(gh release view --repo canonical/vanilla-framework --json tagName --jq '.tagName')
            echo "Resolved: ${INPUT_REF}"
          fi
          echo "VANILLA_REF=${INPUT_REF}" >> "$GITHUB_ENV"

      - name: Download Vanilla Framework colour sources
        run: |
          mkdir -p /tmp/palette-tooling/vendor
          for file in _settings_colors.scss _global_functions.scss; do
            echo "Fetching ${file} @ ${VANILLA_REF}"
            curl --fail --silent --show-error --location \
              "https://raw.githubusercontent.com/canonical/vanilla-framework/${VANILLA_REF}/scss/${file}" \
              --output "/tmp/palette-tooling/vendor/${file}"
          done
          echo "OK"

      - name: Generate dynamic palette shim
        run: |
          # Throwaway shim (never committed).  Each Vanilla theme's colour set is
          # emitted under a placeholder class selector; a later sed rewrites those
          # into parametric Less mixins (`.vf-theme-*-colors()`, `.vf-static-colors()`)
          # that produce no output until called.
          #
          # Using Vanilla's own vf-theme-*--colors mixins keeps the emitted
          # `--vf-color-*` custom properties in exact sync with upstream, for the
          # full colour set.  _global_functions.scss supplies
          # vf-contrast-text-color(), used by the button colours in those mixins.
          cat > /tmp/palette-tooling/palette-shim.scss <<'SCSS'
          @use 'sass:color';
          @use 'sass:map';

          @import 'global_functions';
          @import 'settings_colors';

          .vf-theme-light-colors { @include vf-theme-light--colors; }
          .vf-theme-dark-colors  { @include vf-theme-dark--colors; }
          .vf-theme-paper-colors { @include vf-theme-paper--colors; }

          // Theme-independent colours (Ubuntu branding, and any future constants)
          .vf-static-colors {
            --vf-color-ubuntu: #{$color-ubuntu};
            --vf-color-brand: #{$color-brand};
            --vf-color-brand-dark: #{$color-brand-dark};
            --vf-color-accent-light: #{$color-accent};
            --vf-color-accent-dark: #{$color-accent-dark};
            --vf-color-accent-background: #{$color-accent-background};
          }
          SCSS

      - name: Compile palette shim with Sass
        run: |
          mkdir -p resources/skins.ubuntu.styles
          # Compile, then rewrite the placeholder class selectors into parametric
          # Less mixins by appending "()" to each `.vf-*` selector.
          sass /tmp/palette-tooling/palette-shim.scss \
            --load-path=/tmp/palette-tooling/vendor \
            --no-source-map \
            --style=expanded \
            --silence-deprecation=global-builtin,import,color-functions \
          | sed -E 's/^\.(vf-[a-z-]+) \{/.\1() {/' \
          > /tmp/palette-mixins.less

      - name: Wrap palette into .less file
        run: |
          VANILLA_SOURCE="https://github.com/canonical/vanilla-framework/blob/main/scss/_settings_colors.scss"
          GENERATED_DATE=$(date +%Y-%m-%d)

          {
            cat <<EOF
          /**
           * Ubuntu skin — Vanilla Framework colour palette
           *
           * AUTO-GENERATED — do not edit this file manually.
           * Regenerate by running the "Update Vanilla Framework palette" workflow.
           *
           * Source:    ${VANILLA_SOURCE}
           * Ref:       ${VANILLA_REF}
           * Generated: ${GENERATED_DATE}
           *
           * Exposes each Vanilla theme's colour set as a callable Less mixin
           * (.vf-theme-{light,dark,paper}-colors()) plus constant Ubuntu branding
           * (.vf-static-colors()).  These mixins produce no output on their own;
           * applying them (at the document root and/or on individual elements) is
           * done manually elsewhere in the skin's stylesheets.
           */

          /* stylelint-disable color-no-invalid-hex */

          EOF
            cat /tmp/palette-mixins.less
          } > resources/skins.ubuntu.styles/ubuntu/ubuntu-palette.less

      - name: Upload generated palette as artifact
        uses: actions/upload-artifact@v7
        with:
          name: ubuntu-palette
          path: resources/skins.ubuntu.styles/ubuntu/ubuntu-palette.less

      - name: Check for palette changes
        id: palette-diff
        uses: canonical/desktop-engineering/gh-actions/common/has-diff@v2
        with:
          working-directory: resources/skins.ubuntu.styles
          fail-on-diff: "false"
          # Ignore the auto-updated date stamp and ref so the workflow doesn't
          # open a PR on every run when Vanilla itself hasn't changed.
          regexp-to-ignore: "Generated: --ignore-matching-lines Ref:"

      - name: Apply label to PR
        if: steps.palette-diff.outputs.diff == 'true' && github.event_name == 'pull_request'
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" --add-label "colors out of sync"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Remove stale label from PR
        if: steps.palette-diff.outputs.diff != 'true' && github.event_name == 'pull_request'
        run: |
          gh pr edit "${{ github.event.pull_request.number }}" --remove-label "colors out of sync"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v8
        id: create-pr
        if: github.event_name != 'pull_request' && steps.palette-diff.outputs.diff == 'true' && inputs.dry_run != true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: main
          branch: bot/update-vanilla-palette
          title: "deps(ubuntu-palette.less): sync Vanilla Framework color palette"
          body: |
            Automated update of `ubuntu-palette.less` from upstream Vanilla Framework.

            **Triggered by:** ${{ github.event_name }}
            **Vanilla ref:** `${{ inputs.vanilla_ref || 'latest stable' }}`

            Changes were produced by including Vanilla's own `vf-theme-*--colors`
            mixins in a generated shim and compiling with Dart Sass, which
            resolves all computed color values (`adjust-color`, `rgba`,
            `color.scale`, map lookups, etc.) into static `--vf-color-*`
            custom properties.
          add-paths: |
            resources/skins.ubuntu.styles/ubuntu/ubuntu-palette.less
          commit-message: "deps(ubuntu-palette.less): sync Vanilla Framework color palette"
          delete-branch: true
          sign-commits: true

      - name: Create summary
        if: always()
        run: |
          echo "# Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Vanilla Framework ref: ${VANILLA_REF}" >> "$GITHUB_STEP_SUMMARY"
          echo "Palette changes detected: ${{ steps.palette-diff.outputs.diff }}" >> "$GITHUB_STEP_SUMMARY"
          echo "Pull request: ${{ steps.create-pr.outputs.pull-request-url || 'N/A' }}" >> "$GITHUB_STEP_SUMMARY"
